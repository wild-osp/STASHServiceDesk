<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STASHServiceDesk</title>
    <style>
        /* ============================================================
           СТИЛИ В СТИЛЕ STASH.BY
           ============================================================ */
        :root {
            --bg-primary: #0b1a2f;
            --bg-secondary: #112240;
            --bg-card: #1a2d4a;
            --text-primary: #e8edf3;
            --text-secondary: #8ba0c7;
            --accent: #f5a623;
            --accent-dark: #d4911f;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --radius: 12px;
            --transition: all 0.2s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 16px;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 16px;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 20px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-icon {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
        }
        .header-icon span { color: var(--text-primary); }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .header h1 small {
            display: block;
            font-size: 10px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header-badge {
            background: var(--accent);
            color: var(--bg-primary);
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 14px 8px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }
        .stat-number {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
        }
        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .search-wrapper {
            position: relative;
            margin-bottom: 16px;
        }
        .search-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
        }
        .search-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid var(--bg-secondary);
            border-radius: var(--radius);
            font-size: 15px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }
        .search-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.2);
        }
        .search-wrapper input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .filter-btn {
            padding: 6px 16px;
            border: 1px solid var(--bg-secondary);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .order-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .order-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition);
            border-left: 4px solid var(--accent);
        }
        .order-card:active { transform: scale(0.98); }
        .order-card .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .order-number {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-primary);
        }
        .order-status {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .status-new { background: #1e3a5f; color: #93bbfc; }
        .status-repair { background: #5f3a1e; color: #fbbf7c; }
        .status-consultation { background: #4a1e5f; color: #d8b4fe; }
        .status-waiting { background: #5f4a1e; color: #fcd34d; }
        .status-warranty { background: #1e4a3a; color: #6ee7a7; }
        .status-ready { background: #1e3a2a; color: #34d399; }
        .status-notpaid { background: #4a1e1e; color: #fca5a5; }
        .status-paid { background: #1a3a2a; color: #86efac; }
        .status-default { background: #2d2d3f; color: #9ca3af; }

        .order-card .info {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
        }
        .order-card .info .emoji { font-size: 13px; }
        .order-card .device {
            margin-top: 6px;
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state h3 { font-size: 18px; color: var(--text-primary); margin-bottom: 4px; }
        .empty-state p { font-size: 14px; opacity: 0.7; }

        .loader { text-align: center; padding: 40px 0; color: var(--text-secondary); }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--bg-secondary);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 999;
            padding: 20px;
            align-items: flex-end;
            justify-content: center;
        }
        .modal.active { display: flex; animation: modalIn 0.3s ease; }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-content {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent);
        }
        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0 4px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        .detail-row .label { color: var(--text-secondary); font-weight: 500; }
        .detail-row .value { font-weight: 500; text-align: right; max-width: 60%; word-break: break-word; }
        .detail-row .value .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .history-title {
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--accent);
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .history-item .h-status { font-weight: 500; color: var(--text-primary); }

        .contact-btn {
            flex: 1;
            min-width: 56px;
            color: white;
            text-decoration: none;
            padding: 10px 8px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-card);
            border-bottom: 3px solid transparent;
        }
        .contact-btn:active { transform: scale(0.95); }
        .contact-btn.call { background: #1a3a2a; border-bottom-color: #22c55e; color: #86efac; }
        .contact-btn.viber { background: #2a1a4a; border-bottom-color: #8b5cf6; color: #c4b5fd; }
        .contact-btn.telegram { background: #1a2a4a; border-bottom-color: #3b82f6; color: #93bbfc; }
        .contact-btn
