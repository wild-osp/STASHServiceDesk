<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STASHServiceDesk</title>
    <style>
        /* ========== CSS Variables ========== */
        :root {
            --bg: var(--tg-theme-bg-color, #f0f2f5);
            --card-bg: var(--tg-theme-secondary-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #1a1a2e);
            --text-secondary: var(--tg-theme-hint-color, #6c757d);
            --primary: var(--tg-theme-button-color, #4f46e5);
            --primary-light: #818cf8;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========== Reset & Base ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* ========== Scrollbar ========== */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 10px; }

        /* ========== Header ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 16px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            margin-bottom: 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-badge {
            background: var(--primary);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* ========== Stats Grid ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 14px 12px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .stat-card:active { transform: scale(0.96); }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            line-height: 1.2;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .stat-card.green .stat-number { color: var(--success); }
        .stat-card.blue .stat-number { color: var(--primary); }
        .stat-card.orange .stat-number { color: var(--warning); }

        /* ========== Search ========== */
        .search-wrapper {
            position: relative;
            margin-bottom: 12px;
        }

        .search-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-secondary);
        }

        .search-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            background: var(--card-bg);
            color: var(--text);
            box-shadow: var(--shadow);
            transition: var(--transition);
            outline: none;
        }

        .search-wrapper input:focus {
            box-shadow: 0 0 0 3px var(--primary-light), var(--shadow);
        }

        .search-wrapper input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* ========== Filters ========== */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .filters::-webkit-scrollbar { display: none; }

        .filter-btn {
            padding: 6px 16px;
            border: none;
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .filter-btn:active { transform: scale(0.94); }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.35);
        }

        /* ========== Order Cards ========== */
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .order-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: var(--transition);
            border-left: 4px solid var(--primary);
        }

        .order-card:active { transform: scale(0.98); }

        .order-card .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .order-number {
            font-weight: 700;
            font-size: 16px;
            color: var(--text);
        }

        .order-status {
            font-size: 12px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 12px;
            white-space: nowrap;
        }

        .status-new { background: #dbeafe; color: #1d4ed8; }
        .status-diagnostic { background: #fef3c7; color: #b45309; }
        .status-repair { background: #e0e7ff; color: #4338ca; }
        .status-ready { background: #d1fae5; color: #065f46; }
        .status-default { background: #f3f4f6; color: #4b5563; }

        .order-card .info {
            margin-top: 8px;
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
        }

        .order-card .info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .order-card .info .emoji { font-size: 14px; }

        .order-card .device {
            margin-top: 6px;
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
        }

        /* ========== Empty State ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .big-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .empty-state p {
            font-size: 14px;
            opacity: 0.7;
        }

        /* ========== Loading ========== */
        .loader {
            text-align: center;
            padding: 40px 0;
            color: var(--text-secondary);
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--card-bg);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== Modal ========== */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            z-index: 999;
            padding: 20px;
            align-items: flex-end;
            justify-content: center;
        }

        .modal.active {
            display: flex;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-content {
            background: var(--bg);
            border-radius: var(--radius);
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }

        .modal-close:active { transform: scale(0.9); }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            font-size: 14px;
        }

        .detail-row .label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .detail-row .value {
            font-weight: 500;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }

        .detail-row .value .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .history-title {
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .history-item .h-status { font-weight: 500; color: var(--text); }

        /* ========== Telegram Theme Support ========== */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f1a;
                --card-bg: #1a1a2e;
                --text: #e4e4e7;
                --text-secondary: #8b8ba3;
                --shadow: 0 4px 20px rgba(0,0,0,0.3);
            }
            .status-new { background: #1e3a5f; color: #93bbfc; }
            .status-diagnostic { background: #5f3a1e; color: #fbbf7c; }
            .status-repair { background: #1e2f5f; color: #93bbfc; }
            .status-ready { background: #1e3f2a; color: #6ee7a7; }
            .status-default { background: #2d2d3f; color: #9ca3af; }
            .filter-btn { background: #1a1a2e; }
            .filter-btn.active { background: var(--primary); }
        }

        /* ========== Responsive ========== */
        @media (max-width: 480px) {
            body { padding: 12px; }
            .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .stat-card { padding: 10px 8px; }
            .stat-number { font-size: 20px; }
            .header h1 { font-size: 17px; }
            .header-badge { font-size: 11px; padding: 3px 10px; }
            .modal-content { padding: 16px; }
        }

        @media (min-width: 600px) {
            .order-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        }

        @media (min-width: 900px) {
            .order-list { grid-template-columns: 1fr 1fr 1fr; }
            body { max-width: 1100px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <div class="header">
        <div class="header-left">
            <div class="header-icon">📦</div>
            <h1>STASHServiceDesk</h1>
        </div>
        <span class="header-badge" id="totalBadge">0</span>
    </div>

    <!-- ==================== STATS ==================== -->
    <div class="stats-grid">
        <div class="stat-card blue">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Всего</div>
        </div>
        <div class="stat-card green">
            <div class="stat-number" id="statToday">0</div>
            <div class="stat-label">Сегодня</div>
        </div>
        <div class="stat-card orange">
            <div class="stat-number" id="statStatuses">0</div>
            <div class="stat-label">Статусов</div>
        </div>
    </div>

    <!-- ==================== SEARCH ==================== -->
    <div class="search-wrapper">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Поиск по номеру, телефону, ФИО..." />
    </div>

    <!-- ==================== FILTERS ==================== -->
    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="Принят в ремонт">Принят</button>
        <button class="filter-btn" data-filter="Диагностика">Диагностика</button>
        <button class="filter-btn" data-filter="В ремонте">Ремонт</button>
        <button class="filter-btn" data-filter="Готов">Готов</button>
    </div>

    <!-- ==================== ORDER LIST ==================== -->
    <div class="order-list" id="orderList">
        <div class="loader"><div class="spinner"></div>Загрузка заказов...</div>
    </div>

    <!-- ==================== MODAL ==================== -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Заказ</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script>
        // ============================================================
        // DATA
        // ============================================================
        let allOrders = [];
        let currentFilter = 'all';
        let searchQuery = '';

        const API_BASE = window.location.origin + '/api';

        // ============================================================
        // TELEGRAM WEB APP
        // ============================================================
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ============================================================
        // DOM REFS
        // ============================================================
        const $ = id => document.getElementById(id);
        const orderList = $('orderList');
        const searchInput = $('searchInput');
        const filtersEl = $('filters');
        const modal = $('modal');
        const modalTitle = $('modalTitle');
        const modalBody = $('modalBody');

        // ============================================================
        // HELPERS
        // ============================================================
        function statusClass(status) {
            const map = {
                'Принят в ремонт': 'new',
                'Диагностика': 'diagnostic',
                'В ремонте': 'repair',
                'Готов': 'ready'
            };
            return map[status] || 'default';
        }

        function escapeHtml(text) {
            if (!text) return '—';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // LOAD ORDERS
        // ============================================================
        async function loadOrders() {
            try {
                const resp = await fetch(`${API_BASE}/orders?limit=200`);
                const result = await resp.json();
                if (result.success) {
                    allOrders = result.data;
                    updateStats(result.pagination.total);
                    renderOrders();
                } else {
                    showError('Не удалось загрузить заказы');
                }
            } catch (e) {
                console.error(e);
                showError('Ошибка соединения с сервером');
            }
        }

        // ============================================================
        // UPDATE STATS
        // ============================================================
        function updateStats(total) {
            $('totalBadge').textContent = total;
            $('statTotal').textContent = total;

            const today = new Date().toISOString().slice(0,10);
            const todayOrders = allOrders.filter(o => o.date === today);
            $('statToday').textContent = todayOrders.length;

            const statuses = new Set(allOrders.map(o => o.status).filter(Boolean));
            $('statStatuses').textContent = statuses.size;
        }

        // ============================================================
        // RENDER ORDERS
        // ============================================================
        function renderOrders() {
            let filtered = allOrders;

            // Filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(o => o.status === currentFilter);
            }

            // Search
            const q = searchQuery.trim().toLowerCase();
            if (q) {
                filtered = filtered.filter(o =>
                    (o.order_number || '').includes(q) ||
                    (o.phone || '').includes(q) ||
                    (o.client_name || '').toLowerCase().includes(q) ||
                    (o.device || '').toLowerCase().includes(q) ||
                    (o.problem || '').toLowerCase().includes(q)
                );
            }

            if (filtered.length === 0) {
                orderList.innerHTML = `
                    <div class="empty-state">
                        <div class="big-icon">📭</div>
                        <h3>Заказов не найдено</h3>
                        <p>Попробуйте изменить фильтр или поиск</p>
                    </div>
                `;
                return;
            }

            orderList.innerHTML = filtered.map(order => `
                <div class="order-card" onclick="openOrder(${order.id})">
                    <div class="top-row">
                        <span class="order-number">#${escapeHtml(order.order_number)}</span>
                        <span class="order-status status-${statusClass(order.status)}">${escapeHtml(order.status) || 'Новый'}</span>
                    </div>
                    <div class="info">
                        <span><span class="emoji">👤</span> ${escapeHtml(order.client_name) || 'Не указан'}</span>
                        <span><span class="emoji">📱</span> ${escapeHtml(order.phone) || 'Не указан'}</span>
                    </div>
                    <div class="device">🖥️ ${escapeHtml(order.device) || 'Устройство не указано'}</div>
                </div>
            `).join('');
        }

        // ============================================================
        // OPEN ORDER DETAIL
        // ============================================================
        async function openOrder(orderId) {
            try {
                const resp = await fetch(`${API_BASE}/orders/${orderId}`);
                const result = await resp.json();
                if (result.success) {
                    showModal(result.data);
                }
            } catch (e) {
                console.error(e);
            }
        }

        // ============================================================
        // SHOW MODAL
        // ============================================================
        function showModal(order) {
            modalTitle.textContent = `#${order.order_number}`;

            const historyHtml = order.history && order.history.length > 0
                ? `
                    <div class="history-title">📜 История статусов</div>
                    ${order.history.map(h => `
                        <div class="history-item">
                            <span class="h-status">${escapeHtml(h.status)}</span>
                            <span>${h.changed_at ? h.changed_at.slice(0,16).replace('T',' ') : ''}</span>
                        </div>
                    `).join('')}
                `
                : '<div style="margin-top:12px;color:var(--text-secondary);font-size:13px;">Нет истории статусов</div>';

            modalBody.innerHTML = `
                <div class="detail-row">
                    <span class="label">Статус</span>
                    <span class="value"><span class="status-badge status-${statusClass(order.status)}">${escapeHtml(order.status) || 'Новый'}</span></span>
                </div>
                <div class="detail-row">
                    <span class="label">Дата приема</span>
                    <span class="value">${escapeHtml(order.date) || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Приёмщик</span>
                    <span class="value">${escapeHtml(order.receiver) || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Клиент</span>
                    <span class="value">${escapeHtml(order.client_name) || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Телефон</span>
                    <span class="value">${escapeHtml(order.phone) || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Устройство</span>
                    <span class="value">${escapeHtml(order.device) || '—'}</span>
                </div>
                <div class="detail-row" style="border-bottom:none;">
                    <span class="label">Неисправность</span>
                    <span class="value">${escapeHtml(order.problem) || '—'}</span>
                </div>
                ${historyHtml}
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // ============================================================
        // CLOSE MODAL
        // ============================================================
        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Close on backdrop click
        modal.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ============================================================
        // ERROR
        // ============================================================
        function showError(msg) {
            orderList.innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">⚠️</div>
                    <h3>Ошибка</h3>
                    <p>${msg}</p>
                </div>
            `;
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        searchInput.addEventListener('input', function() {
            searchQuery = this.value;
            renderOrders();
        });

        filtersEl.addEventListener('click', function(e) {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;

            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            currentFilter = btn.dataset.filter;
            renderOrders();
        });

        // ============================================================
        // INIT
        // ============================================================
        loadOrders();
        setInterval(loadOrders, 30000);
    </script>
</body>
</html>
