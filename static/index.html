<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STASHServiceDesk</title>
    <style>
        /* ============================================================
           СТИЛИ В СТИЛЕ STASH.BY
           ============================================================ */

        /* ---------- Базовые переменные ---------- */
        :root {
            --bg-primary: #0b1a2f;
            --bg-secondary: #112240;
            --bg-card: #1a2d4a;
            --text-primary: #e8edf3;
            --text-secondary: #8ba0c7;
            --accent: #f5a623;
            --accent-dark: #d4911f;
            --shadow: 0 4px 20px rgba(0,0,0,0.4);
            --radius: 12px;
            --transition: all 0.2s ease;
        }

        /* ---------- Общие ---------- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 16px;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* ---------- Шапка ---------- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 16px;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 20px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-icon {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -1px;
        }
        .header-icon span { color: var(--text-primary); }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .header h1 small {
            display: block;
            font-size: 10px;
            font-weight: 400;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .header-badge {
            background: var(--accent);
            color: var(--bg-primary);
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* ---------- Статистика ---------- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 14px 8px;
            text-align: center;
            border-bottom: 3px solid var(--accent);
        }
        .stat-number {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
        }
        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        /* ---------- Поиск ---------- */
        .search-wrapper {
            position: relative;
            margin-bottom: 16px;
        }
        .search-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 16px;
        }
        .search-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: 1px solid var(--bg-secondary);
            border-radius: var(--radius);
            font-size: 15px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            outline: none;
            transition: var(--transition);
        }
        .search-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.2);
        }
        .search-wrapper input::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        /* ---------- Фильтры ---------- */
        .filters {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .filter-btn {
            padding: 6px 16px;
            border: 1px solid var(--bg-secondary);
            border-radius: 20px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
        }
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        /* ---------- Карточки заказов ---------- */
        .order-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .order-card {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 16px;
            cursor: pointer;
            transition: var(--transition);
            border-left: 4px solid var(--accent);
        }
        .order-card:active { transform: scale(0.98); }
        .order-card .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .order-number {
            font-weight: 700;
            font-size: 16px;
            color: var(--text-primary);
        }
        .order-status {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* ---------- СТАТУСЫ (1С) ---------- */
        .status-new { background: #1e3a5f; color: #93bbfc; }           /* Принят в ремонт */
        .status-repair { background: #5f3a1e; color: #fbbf7c; }        /* В ремонте */
        .status-consultation { background: #4a1e5f; color: #d8b4fe; }  /* Согласование с клиентом */
        .status-waiting { background: #5f4a1e; color: #fcd34d; }       /* Ожидание запчасти */
        .status-warranty { background: #1e4a3a; color: #6ee7a7; }      /* Гарантия */
        .status-ready { background: #1e3a2a; color: #34d399; }         /* Готово */
        .status-notpaid { background: #4a1e1e; color: #fca5a5; }       /* Выдано (не оплачено) */
        .status-paid { background: #1a3a2a; color: #86efac; }          /* Выдано (оплачено) */
        .status-default { background: #2d2d3f; color: #9ca3af; }

        .order-card .info {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 8px 16px;
        }
        .order-card .info .emoji { font-size: 13px; }
        .order-card .device {
            margin-top: 6px;
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* ---------- Пустое состояние ---------- */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state h3 { font-size: 18px; color: var(--text-primary); margin-bottom: 4px; }
        .empty-state p { font-size: 14px; opacity: 0.7; }

        /* ---------- Загрузка ---------- */
        .loader { text-align: center; padding: 40px 0; color: var(--text-secondary); }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--bg-secondary);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---------- Модальное окно ---------- */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 999;
            padding: 20px;
            align-items: flex-end;
            justify-content: center;
        }
        .modal.active { display: flex; animation: modalIn 0.3s ease; }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .modal-content {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--accent);
        }
        .modal-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0 4px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        .detail-row .label { color: var(--text-secondary); font-weight: 500; }
        .detail-row .value { font-weight: 500; text-align: right; max-width: 60%; word-break: break-word; }
        .detail-row .value .status-badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .history-title {
            font-weight: 600;
            margin-top: 16px;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--accent);
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            color: var(--text-secondary);
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .history-item .h-status { font-weight: 500; color: var(--text-primary); }

        /* ---------- Кнопки контактов ---------- */
        .contact-btn {
            flex: 1;
            min-width: 56px;
            color: white;
            text-decoration: none;
            padding: 10px 8px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            background: var(--bg-card);
            border-bottom: 3px solid transparent;
        }
        .contact-btn:active { transform: scale(0.95); }
        .contact-btn.call { background: #1a3a2a; border-bottom-color: #22c55e; color: #86efac; }
        .contact-btn.viber { background: #2a1a4a; border-bottom-color: #8b5cf6; color: #c4b5fd; }
        .contact-btn.telegram { background: #1a2a4a; border-bottom-color: #3b82f6; color: #93bbfc; }
        .contact-btn.copy { background: #2a2a3a; border-bottom-color: var(--text-secondary); color: var(--text-secondary); flex: 0.4; min-width: 44px; }

        /* ---------- Адаптивность ---------- */
        @media (max-width: 480px) {
            body { padding: 12px; }
            .stats-grid { gap: 6px; }
            .stat-card { padding: 10px 4px; }
            .stat-number { font-size: 20px; }
            .header h1 { font-size: 15px; }
            .header-badge { font-size: 12px; padding: 2px 10px; }
            .modal-content { padding: 16px; }
        }
        @media (min-width: 600px) {
            .order-list { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        }
        @media (min-width: 900px) {
            .order-list { grid-template-columns: 1fr 1fr 1fr; }
            body { max-width: 1100px; margin: 0 auto; }
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <div class="header">
        <div class="header-left">
            <div class="header-icon">ST<span>ASH</span></div>
            <div>
                <h1>ServiceDesk <small>сервисный центр</small></h1>
            </div>
        </div>
        <span class="header-badge" id="totalBadge">0</span>
    </div>

    <!-- ==================== STATS ==================== -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">Всего заказов</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statToday">0</div>
            <div class="stat-label">Сегодня</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="statStatuses">0</div>
            <div class="stat-label">Статусов</div>
        </div>
    </div>

    <!-- ==================== SEARCH ==================== -->
    <div class="search-wrapper">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Поиск по номеру, телефону, ФИО, устройству..." />
    </div>

    <!-- ==================== FILTERS ==================== -->
    <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="Принят в ремонт">Принят</button>
        <button class="filter-btn" data-filter="В ремонте">Ремонт</button>
        <button class="filter-btn" data-filter="Согласование с клиентом">Согласование</button>
        <button class="filter-btn" data-filter="Ожидание запчасти">Ожидание</button>
        <button class="filter-btn" data-filter="Гарантия">Гарантия</button>
        <button class="filter-btn" data-filter="Готово">Готово</button>
        <button class="filter-btn" data-filter="Выдано (не оплачено)">Не оплачено</button>
        <button class="filter-btn" data-filter="Выдано (оплачено)">Оплачено</button>
    </div>

    <!-- ==================== ORDER LIST ==================== -->
    <div class="order-list" id="orderList">
        <div class="loader"><div class="spinner"></div>Загрузка заказов...</div>
    </div>

    <!-- ==================== MODAL ==================== -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Заказ</h2>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ==================== SCRIPTS ==================== -->
    <script>
        // ============================================================
        // DATA
        // ============================================================
        let allOrders = [];
        let currentFilter = 'all';
        let searchQuery = '';
        const API_BASE = window.location.origin + '/api';

        // ============================================================
        // TELEGRAM WEB APP
        // ============================================================
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        // ============================================================
        // DOM REFS
        // ============================================================
        const $ = id => document.getElementById(id);
        const orderList = $('orderList');
        const searchInput = $('searchInput');
        const filtersEl = $('filters');
        const modal = $('modal');
        const modalTitle = $('modalTitle');
        const modalBody = $('modalBody');

        // ============================================================
        // СТАТУСЫ (сопоставление с CSS-классами)
        // ============================================================
        const statusMap = {
            'Принят в ремонт': 'new',
            'В ремонте': 'repair',
            'Согласование с клиентом': 'consultation',
            'Ожидание запчасти': 'waiting',
            'Гарантия': 'warranty',
            'Готово': 'ready',
            'Выдано (не оплачено)': 'notpaid',
            'Выдано (оплачено)': 'paid'
        };

        function getStatusClass(status) {
            return statusMap[status] || 'default';
        }

        function escapeHtml(text) {
            if (!text) return '—';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // OPEN APP FUNCTIONS
        // ============================================================
        function openViber(phone) {
            const clean = phone.replace(/[^0-9]/g, '');
            const url = `viber://chat?number=${clean}`;
            const win = window.open(url, '_blank');
            if (!win || win.closed) {
                alert(`Viber не установлен или не открылся.\nНомер: ${phone}\nСкопируйте номер и вставьте вручную.`);
            }
        }

        function openTelegram(phone) {
            const clean = phone.replace(/[^0-9]/g, '');
            const url = `tg://resolve?phone=${clean}`;
            const win = window.open(url, '_blank');
            if (!win || win.closed) {
                alert(`Telegram не открылся.\nНомер: ${phone}\nСкопируйте номер и вставьте в Telegram вручную.`);
            }
        }

        function copyPhone(phone) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(phone).then(() => {
                    alert(`📋 Номер скопирован: ${phone}`);
                }).catch(() => {
                    alert(`📱 Номер: ${phone}`);
                });
            } else {
                alert(`📱 Номер: ${phone}`);
            }
        }

        // ============================================================
        // LOAD ORDERS
        // ============================================================
        async function loadOrders() {
            try {
                const resp = await fetch(`${API_BASE}/orders?limit=200`);
                const result = await resp.json();
                if (result.success) {
                    allOrders = result.data;
                    updateStats(result.pagination.total);
                    renderOrders();
                } else {
                    showError('Не удалось загрузить заказы');
                }
            } catch (e) {
                console.error(e);
                showError('Ошибка соединения с сервером');
            }
        }

        // ============================================================
        // UPDATE STATS
        // ============================================================
        function updateStats(total) {
            $('totalBadge').textContent = total;
            $('statTotal').textContent = total;

            const today = new Date().toISOString().slice(0,10);
            const todayOrders = allOrders.filter(o => o.date === today);
            $('statToday').textContent = todayOrders.length;

            const statuses = new Set(allOrders.map(o => o.status).filter(Boolean));
            $('statStatuses').textContent = statuses.size;
        }

        // ============================================================
        // RENDER ORDERS
        // ============================================================
        function renderOrders() {
            let filtered = allOrders;

            if (currentFilter !== 'all') {
                filtered = filtered.filter(o => o.status === currentFilter);
            }

            const q = searchQuery.trim().toLowerCase();
            if (q) {
                filtered = filtered.filter(o =>
                    (o.order_number || '').includes(q) ||
                    (o.phone || '').includes(q) ||
                    (o.client_name || '').toLowerCase().includes(q) ||
                    (o.device || '').toLowerCase().includes(q) ||
                    (o.problem || '').toLowerCase().includes(q)
                );
            }

            if (filtered.length === 0) {
                orderList.innerHTML = `
                    <div class="empty-state">
                        <div class="big-icon">📭</div>
                        <h3>Заказов не найдено</h3>
                        <p>Попробуйте изменить фильтр или поиск</p>
                    </div>
                `;
                return;
            }

            orderList.innerHTML = filtered.map(order => `
                <div class="order-card" onclick="openOrder(${order.id})">
                    <div class="top-row">
                        <span class="order-number">#${escapeHtml(order.order_number)}</span>
                        <span class="order-status status-${getStatusClass(order.status)}">${escapeHtml(order.status) || 'Новый'}</span>
                    </div>
                    <div class="info">
                        <span><span class="emoji">👤</span> ${escapeHtml(order.client_name) || 'Не указан'}</span>
                        <span><span class="emoji">📱</span> ${escapeHtml(order.phone) || 'Не указан'}</span>
                    </div>
                    <div class="device">🖥️ ${escapeHtml(order.device) || 'Устройство не указано'}</div>
                </div>
            `).join('');
        }

        // ============================================================
        // OPEN ORDER DETAIL
        // ============================================================
        async function openOrder(orderId) {
            try {
                const resp = await fetch(`${API_BASE}/orders/${orderId}`);
                const result = await resp.json();
                if (result.success) {
                    showModal(result.data);
                }
            } catch (e) {
                console.error(e);
            }
        }

        // ============================================================
        // SHOW MODAL (with contacts)
        // ============================================================
        function showModal(order) {
            modalTitle.textContent = `#${order.order_number}`;

            // ========== КОНТАКТЫ ==========
            let contactsHtml = '';
            const phone = order.phone || '';

            let cleanPhone = phone.replace(/[^0-9+]/g, '');
            if (cleanPhone.startsWith('8') && cleanPhone.length === 11) {
                cleanPhone = '+7' + cleanPhone.slice(1);
            }
            if (!cleanPhone.startsWith('+') && cleanPhone.length > 0) {
                cleanPhone = '+' + cleanPhone;
            }

            if (cleanPhone && cleanPhone.length > 4) {
                const telLink = `tel:${cleanPhone}`;
                const displayPhone = phone;

                contactsHtml = `
                    <div style="display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 4px;">
                        <a href="${telLink}" class="contact-btn call">📞 Позвонить</a>
                        <button class="contact-btn viber" onclick="openViber('${cleanPhone}')">💬 Viber</button>
                        <button class="contact-btn telegram" onclick="openTelegram('${cleanPhone}')">✈️ Telegram</button>
                        <button class="contact-btn copy" onclick="copyPhone('${displayPhone}')">📋</button>
                    </div>
                    <div style="font-size:12px;color:var(--text-secondary);text-align:center;margin-bottom:8px;">
                        📱 ${displayPhone}
                    </div>
                `;
            }

            // ========== ИСТОРИЯ ==========
            const historyHtml = order.history && order.history.length > 0
                ? `
                    <div class="history-title">📜 История статусов</div>
                    ${order.history.map(h => `
                        <div class="history-item">
                            <span class="h-status">${escapeHtml(h.status)}</span>
                            <span>${h.changed_at ? h.changed_at.slice(0,16).replace('T',' ') : ''}</span>
                        </div>
                    `).join('')}
                `
                : '<div style="margin-top:12px;color:var(--text-secondary);font-size:13px;">Нет истории статусов</div>';

            // ========== СБОРКА ==========
            modalBody.innerHTML = `
                ${contactsHtml}

                <div class="detail-row">
                    <span class="label">Статус</span>
                    <span class="value"><span class="status-badge status-${getStatusClass(order.status)}">${escapeHtml(order.status) || 'Новый'}</span></span>
                </div>
                <div class="detail-row">
                    <span class="label">Дата приема</span>
                    <span class="value">${escapeHtml(order.date) || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Приёмщик</span>
                    <span class="value">${escapeHtml(order.receiver) || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Клиент</span>
                    <span class="value">${escapeHtml(order.client_name) || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Телефон</span>
                    <span class="value">${escapeHtml(order.phone) || '—'}</span>
                </div>
                <div class="detail-row">
                    <span class="label">Устройство</span>
                    <span class="value">${escapeHtml(order.device) || '—'}</span>
                </div>
                <div class="detail-row" style="border-bottom:none;">
                    <span class="label">Неисправность</span>
                    <span class="value">${escapeHtml(order.problem) || '—'}</span>
                </div>
                ${historyHtml}
            `;

            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // ============================================================
        // CLOSE MODAL
        // ============================================================
        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = '';
        }
        modal.addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // ============================================================
        // ERROR
        // ============================================================
        function showError(msg) {
            orderList.innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">⚠️</div>
                    <h3>Ошибка</h3>
                    <p>${msg}</p>
                </div>
            `;
        }

        // ============================================================
        // EVENT LISTENERS
        // ============================================================
        searchInput.addEventListener('input', function() {
            searchQuery = this.value;
            renderOrders();
        });

        filtersEl.addEventListener('click', function(e) {
            const btn = e.target.closest('.filter-btn');
            if (!btn) return;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.filter;
            renderOrders();
        });

        // ============================================================
        // INIT
        // ============================================================
        loadOrders();
        setInterval(loadOrders, 30000);
    </script>
</body>
</html>
